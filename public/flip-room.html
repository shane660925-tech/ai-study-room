<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>單機翻轉專區 | 單機翻轉大廳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/lobby-main.css">
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans relative overflow-x-hidden pb-20 flex justify-center">

    <div class="w-full max-w-xl p-6 min-h-screen">
        <header class="flex justify-between items-center mb-10 bg-white/5 p-4 rounded-3xl border border-white/10 backdrop-blur-md shadow-xl">
            <div>
                <h1 class="text-2xl font-black text-blue-500 italic flex items-center">
                    <i class="fas fa-mobile-alt mr-2"></i>游擊隊總部
                </h1>
                <p class="text-[10px] text-gray-500 tracking-widest mt-1 uppercase">Standalone Command Center</p>
            </div>
            <div class="bg-blue-900/40 border border-blue-500/30 px-3 py-1.5 rounded-2xl flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-xs font-bold text-blue-300">在線翻轉：<span id="onlineFlipCount" class="text-white">0</span> 人</span>
            </div>
        </header>

        <section class="mb-10">
            <div class="flex items-center justify-between mb-4 px-1">
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center">
                    <img id="userAvatar" src="" class="w-8 h-8 rounded-full mr-3 border border-gray-600 bg-gray-800">
                    <span id="welcomeName" class="text-white">學員</span> 的戰績
                </h2>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-gradient-to-br from-white/10 to-transparent border border-white/10 rounded-3xl p-5 text-center">
                    <i class="fas fa-clock text-blue-400 text-xl mb-2"></i>
                    <span id="statHours" class="text-3xl font-black text-white block">0</span>
                    <span class="text-[10px] text-gray-500 uppercase">累積時數</span>
                </div>
                <div class="bg-gradient-to-br from-white/10 to-transparent border border-white/10 rounded-3xl p-5 text-center">
                    <i class="fas fa-fire text-orange-400 text-xl mb-2"></i>
                    <span id="statDays" class="text-3xl font-black text-white block">0</span>
                    <span class="text-[10px] text-gray-400 uppercase">連續專注</span>
                </div>
                <div class="bg-gradient-to-br from-white/10 to-transparent border border-white/10 rounded-3xl p-5 text-center">
                    <i class="fas fa-shield-alt text-green-400 text-xl mb-2"></i>
                    <span id="statScore" class="text-3xl font-black text-white block">100</span>
                    <span class="text-[10px] text-gray-500 uppercase">總積分</span>
                </div>
                <div class="bg-gradient-to-br from-white/10 to-transparent border border-white/10 rounded-3xl p-5 text-center">
                    <i class="fas fa-medal text-yellow-400 text-xl mb-2"></i>
                    <span id="statBadges" class="text-3xl font-black text-white block">0</span>
                    <span class="text-[10px] text-gray-500 uppercase">解鎖成就</span>
                </div>
            </div>
        </section>

        <section class="mb-10 space-y-4">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-[0.2em] mb-4 px-1"><i class="fas fa-door-open mr-2"></i>選擇翻轉教室</h2>
            <button onclick="openStandaloneModal('immersive-room.html')" class="w-full bg-gradient-to-r from-purple-900/80 to-purple-800/80 border border-purple-500/40 rounded-3xl p-5 text-left flex items-center gap-5 shadow-2xl active:scale-95">
                <div class="w-14 h-14 rounded-2xl bg-purple-500/20 flex items-center justify-center text-purple-300 text-3xl"><i class="fas fa-eye-slash"></i></div>
                <div class="flex-1">
                    <h3 class="text-xl font-black text-white mb-1">沉浸式自習室</h3>
                    <p class="text-xs text-purple-200/60">手機蓋上即進入深度專注模式。</p>
                </div>
            </button>
            <button onclick="openStandaloneThemeRoomModal()" class="w-full bg-gradient-to-r from-blue-900/80 to-blue-800/80 border border-blue-500/40 rounded-3xl p-5 text-left flex items-center gap-5 shadow-2xl active:scale-95">
                <div class="w-14 h-14 rounded-2xl bg-blue-500/20 flex items-center justify-center text-blue-300 text-3xl"><i class="fas fa-users-viewfinder"></i></div>
                <div class="flex-1">
                    <h3 class="text-xl font-black text-white mb-1">主題教室</h3>
                    <p class="text-xs text-blue-200/60">選擇目前開放中的主題教室，手機蓋上後進入專注模式。</p>
                </div>
            </button>
        </section>

        <section class="bg-orange-500/5 border border-orange-500/10 rounded-3xl p-6">
            <h2 class="text-xs font-bold text-orange-500/70 uppercase tracking-widest mb-4"><i class="fas fa-users mr-2"></i>組隊與競賽</h2>
            <button onclick="loadAndShowTeamModal('join')" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center gap-3 active:scale-95">
                <i class="fas fa-search"></i> 查看目前隊伍狀態
            </button>
        </section>

        <div class="mt-12 text-center">
            <a href="index.html" class="text-xs text-gray-500 underline tracking-widest uppercase">← 返回一般大廳</a>
        </div>
    </div>

    <div id="standalone-setup-modal" class="fixed inset-0 z-[9999] bg-black/90 backdrop-blur-md hidden items-center justify-center p-4">
        <div class="bg-[#111827] border border-blue-500/30 p-8 rounded-3xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black text-blue-500 mb-6">單機翻轉設定</h2>
            
            <div id="sa-connect-section">
                <div class="mb-6 py-4">
                    <i class="fas fa-wifi text-4xl text-blue-400 mb-4 animate-pulse"></i>
                    <p class="text-gray-300 font-bold text-lg mb-1">準備進入專注空間</p>
                    <p class="text-xs text-gray-500">點擊下方按鈕建立連線</p>
                </div>
                <button onclick="proceedToInput()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/20">
                    建立連線
                </button>
            </div>

            <div id="sa-input-section" class="hidden">
                <div class="mb-4 text-left">
                    <label class="text-xs text-gray-400 font-bold mb-1 block">讀書目標 (非必填)</label>
                    <input id="sa-goal" type="text" class="w-full bg-black border border-gray-700 rounded-xl p-3 text-white focus:border-blue-500 outline-none" placeholder="未填寫將預設為「自主學習」">
                </div>
                
                <div class="mb-8 text-left">
                    <label class="text-xs text-gray-400 font-bold mb-1 block">專注時間 (分鐘)</label>
                    <input id="sa-time" type="number" class="w-full bg-black border border-gray-700 rounded-xl p-3 text-white focus:border-blue-500 outline-none" value="25">
                </div>

                <button id="btn-sa-ready" onclick="prepareStandaloneFlip()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/20">
                    下一步：準備進入教室
                </button>
            </div>

            <div id="sa-flip-instruction" class="hidden mt-4 animate-pulse">
                <i class="fas fa-mobile-alt text-4xl text-blue-400 mb-3 animate-bounce"></i>
                <p class="text-yellow-400 font-bold text-lg">請將手機螢幕朝下蓋在桌上！</p>
                <p class="text-xs text-gray-400 mt-2">聽到「叮」聲即代表成功傳送至教室</p>
            </div>
            
            <button onclick="closeStandaloneModal()" class="mt-4 text-gray-500 text-sm hover:text-white transition-colors">取消</button>
        </div>
    </div>

    <audio id="success-sound" src="https://www.myinstants.com/media/sounds/mario-coin.mp3" preload="auto"></audio>
    <div id="modal-container"></div>
    
    <div id="standalone-modal-container" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[20000] flex items-center justify-center hidden">
        <div id="waiting-approval-modal" class="bg-[#1e293b] p-8 rounded-3xl border border-blue-500/30 text-center max-w-xs hidden">
            <div class="mb-4 text-blue-400">
                <i class="fas fa-hourglass-half fa-spin text-4xl"></i>
            </div>
            <h3 class="text-xl font-bold mb-2 text-white">申請已送出</h3>
            <p class="text-gray-400 text-sm">正在等待隊長審核，請稍候...</p>
        </div>

        <div id="rejected-modal" class="bg-[#1e293b] p-8 rounded-3xl border border-red-500/30 text-center max-w-xs hidden">
            <div class="mb-4 text-red-500">
                <i class="fas fa-times-circle text-5xl mb-2"></i>
            </div>
            <h3 class="text-xl font-bold mb-2 text-white">申請被婉拒</h3>
            <p class="text-gray-400 text-sm mb-6">隊長目前無法接受您的加入申請。</p>
            <button onclick="closeRejectedModal()" class="w-full bg-gray-700 hover:bg-gray-600 text-white px-6 py-3 rounded-xl font-bold transition-all">確認並返回</button>
        </div>
    </div>

    <script>
        const socket = io();
        const username = localStorage.getItem('studyVerseUser') || "游擊隊員";
        window.myUsername = username; 

        let pendingRoomType = 'managed-room.html';
        let targetStandaloneRoomUrl = '';
        let isRedirecting = false; // 防止連續觸發跳轉的鎖

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('welcomeName').innerText = username;
            document.getElementById('userAvatar').src = `https://api.dicebear.com/7.x/big-smile/svg?seed=${username}`;
            socket.emit("join_room", { name: username, roomMode: 'lobby', status: 'LOBBY' });
        });

        socket.on("update_rank", (users) => {
            const flipCount = users.filter(u => u.isFlipped === true).length;
            const el = document.getElementById('onlineFlipCount');
            if(el) el.innerText = flipCount;
        });

        // ==========================================
        // 單機翻轉模式：視訊鏡頭預設關閉邏輯
        // ==========================================
        function disableCameraForSingleDeviceMode(stream) {
            if (!stream) return;
            
            const videoTracks = stream.getVideoTracks();
            videoTracks.forEach(track => {
                track.stop(); 
            });
            
            console.log("單機翻轉模式：視訊鏡頭已完全關閉以節省能耗。");
        }

        // ==========================================
        // 單機翻轉 核心邏輯 (新版：略過大廳翻轉，直接跳轉教室)
        // ==========================================
async function openStandaloneThemeRoomModal() {
let oldModal = document.getElementById('standaloneThemeRoomModal');
if (oldModal) oldModal.remove();
const modal = document.createElement('div');
modal.id = 'standaloneThemeRoomModal';
modal.className = 'fixed inset-0 z-[10000] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4';
modal.innerHTML = `
<div class="bg-[#111827] w-full max-w-lg rounded-3xl border border-blue-500/30 shadow-2xl overflow-hidden relative">
<button onclick="document.getElementById('standaloneThemeRoomModal').remove()"
class="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10 z-10">
<i class="fas fa-times"></i>
</button>
<div class="p-6 border-b border-gray-800 bg-gradient-to-b from-blue-900/30 to-transparent">
<h2 class="text-2xl font-black text-white flex items-center gap-2">
<i class="fas fa-chalkboard text-blue-400"></i>
選擇主題教室
</h2>
<p class="text-gray-400 text-xs mt-2">
請選擇目前開放中的主題教室，選完後再進入單機翻轉設定。
</p>
</div>
<div id="standaloneThemeRoomList" class="p-6 max-h-[65vh] overflow-y-auto">
<div class="flex flex-col items-center justify-center py-10 text-gray-500">
<div class="w-10 h-10 border-2 border-blue-500/30 border-t-blue-500 rounded-full animate-spin mb-4"></div>
<p class="text-xs tracking-widest uppercase">正在載入主題教室...</p>
</div>
</div>
</div>
`;
document.body.appendChild(modal);
await loadStandaloneThemeRoomList();
}
async function loadStandaloneThemeRoomList() {
const list = document.getElementById('standaloneThemeRoomList');
if (!list) return;
try {
const res = await fetch('/api/theme-rooms');
const data = await res.json();
if (!res.ok) {
throw new Error(data.error || '取得主題教室失敗');
}
const rooms = data.rooms || [];
if (rooms.length === 0) {
list.innerHTML = `
<div class="text-center py-10">
<div class="w-14 h-14 bg-gray-500/20 rounded-2xl flex items-center justify-center text-gray-400 text-2xl mx-auto mb-4">
<i class="fas fa-door-closed"></i>
</div>
<h3 class="text-white font-black mb-2">目前沒有開放中的主題教室</h3>
<p class="text-gray-500 text-xs">請等待官方開放新的衝刺教室。</p>
</div>
`;
return;
}
list.innerHTML = rooms.map(room => {
const title = room.name || '主題教室';
const description = room.description || '官方開放中的主題教室。';
const badge = room.badge_text || '限時開放';
const slug = room.slug;
const roomPage = room.room_page || 'managed-room.html';
const onlineCount = room.online_count || 0;
const targetUrl = `${roomPage}?theme=${encodeURIComponent(slug)}`;
return `
<button onclick="selectStandaloneThemeRoom('${targetUrl}')"
class="w-full bg-white/5 hover:bg-blue-500/10 border border-white/10 hover:border-blue-500/50 p-5 rounded-2xl mb-4 text-left transition-all group">
<div class="flex items-start gap-4">
<div class="w-12 h-12 bg-blue-500/20 rounded-xl flex items-center justify-center text-blue-400 text-2xl group-hover:bg-blue-500 group-hover:text-white transition-all">
<i class="fas fa-users-viewfinder"></i>
</div>
<div class="flex-1">
<div class="flex items-center gap-2 mb-1">
<h3 class="text-white font-black text-lg">${title}</h3>
<span class="text-[9px] bg-blue-500 text-white px-2 py-0.5 rounded-full font-black">${badge}</span>
</div>
<p class="text-gray-500 text-xs leading-relaxed mb-3">${description}</p>
<div class="flex items-center justify-between">
<span class="text-green-400 text-xs font-bold">
<i class="fas fa-circle text-[8px] mr-1"></i>
目前 ${onlineCount} 人
</span>
<span class="text-blue-400 text-xs font-black group-hover:text-blue-300">
選擇此教室 →
</span>
</div>
</div>
</div>
</button>
`;
}).join('');
} catch (err) {
console.error('單機主題教室列表載入失敗:', err);
list.innerHTML = `
<div class="text-center py-10">
<h3 class="text-red-300 font-black mb-2">主題教室載入失敗</h3>
<p class="text-gray-500 text-xs">請稍後重新整理頁面。</p>
</div>
`;
}
}
function selectStandaloneThemeRoom(targetUrl) {
const modal = document.getElementById('standaloneThemeRoomModal');
if (modal) modal.remove();
if (window.pendingThemeTeamJoinData) {
const data = window.pendingThemeTeamJoinData;
window.pendingThemeTeamJoinData = null;
if (typeof window.startStandaloneTeamFlow === 'function') {
window.startStandaloneTeamFlow({
teamId: data.teamId,
teamName: data.teamName,
isApprovalRequired: data.is_approval_required,
targetUrl
});
return;
}
}
openStandaloneModal(targetUrl);
}
window.showThemeRoomModal = openStandaloneThemeRoomModal;
        // 步驟 1: 開啟設定 Modal
        function openStandaloneModal(roomUrl) {
            targetStandaloneRoomUrl = roomUrl;
            isRedirecting = false; // 重置狀態
            
            document.getElementById('standalone-setup-modal').classList.remove('hidden');
            document.getElementById('standalone-setup-modal').classList.add('flex');
            
            document.getElementById('sa-connect-section').classList.remove('hidden');
            document.getElementById('sa-input-section').classList.add('hidden');
            document.getElementById('sa-flip-instruction').classList.add('hidden');
        }

        // 步驟 2/3: 進入輸入畫面並預載音效
        function proceedToInput() {
            document.getElementById('sa-connect-section').classList.add('hidden');
            document.getElementById('sa-input-section').classList.remove('hidden');
            
            const sound = document.getElementById('success-sound');
            sound.load(); 
        }

        // 步驟 4: 儲存目標與時間，直接跳轉進入教室
        function prepareStandaloneFlip() {
            if (isRedirecting) return;
            
            const rawGoal = document.getElementById('sa-goal').value.trim();
            const goal = rawGoal || "自主學習"; // 目標改為非必填，設定預設值
            const time = document.getElementById('sa-time').value.trim();
            
            // 僅檢查時數是否填寫
            if(!time) {
                alert('請務必填寫專注時間喔！');
                return;
            }

            isRedirecting = true; // 上鎖防止重複點擊

            // 將資料存起來，等等跳轉時要放在網址帶過去
            localStorage.setItem('standaloneGoal', goal);
            localStorage.setItem('standaloneTime', time);

            // 隱藏輸入畫面
            document.getElementById('sa-input-section').classList.add('hidden');

            // === 在進入單機翻轉模式前，確實執行鏡頭關閉以節省能耗 ===
            try {
                const streamToClose = window.currentStream || (typeof currentStream !== 'undefined' ? currentStream : null);
                disableCameraForSingleDeviceMode(streamToClose);
            } catch(e) {
                console.error("關閉鏡頭時發生錯誤：", e);
            }

            // 取得要跳轉的教室與參數
            const targetRoom = targetStandaloneRoomUrl || 'managed-room.html';
            const currentUser = localStorage.getItem('studyVerseUser') || "游擊隊員";
            
            // 組合最終 URL (帶上 standalone=true)
const separator = targetRoom.includes('?') ? '&' : '?';
let finalUrl = `/${targetRoom}${separator}username=${encodeURIComponent(currentUser)}&name=${encodeURIComponent(currentUser)}&goal=${encodeURIComponent(goal)}&duration=${time}&standalone=true`;
            
            // 若是加入隊伍進來的，把隊伍參數也接上
            if (window.tempTeamParams) {
                finalUrl += window.tempTeamParams;
                window.tempTeamParams = null; // 處理完清除
            }
            
            // 🚀 關鍵修改：不跳出等待翻轉彈窗，直接跳轉進入教室！
            window.location.href = finalUrl;
        }

        // 取消設定
        function closeStandaloneModal() {
            document.getElementById('standalone-setup-modal').classList.add('hidden');
            document.getElementById('standalone-setup-modal').classList.remove('flex');
            isRedirecting = false;
            window.tempTeamParams = null;
        }

        // ==========================================
        // 隊伍與審核邏輯 
        // ==========================================

        window.showWaitingModal = function(teamName) {
            document.getElementById('standalone-modal-container').classList.remove('hidden');
            document.getElementById('waiting-approval-modal').classList.remove('hidden');
        };

        window.hideWaitingModal = function() {
            document.getElementById('waiting-approval-modal').classList.add('hidden');
        };

        function closeRejectedModal() {
            document.getElementById('rejected-modal').classList.add('hidden');
            document.getElementById('standalone-modal-container').classList.add('hidden');
        }

        window.loadAndShowTeamModal = async function(modalType) {
            try {
                if (!document.getElementById('team-css-link')) {
                    const link = document.createElement('link');
link.id = 'team-css-link';
link.rel = 'stylesheet';
link.href = '/css/lobby-team.css';
                    document.head.appendChild(link);
                }
                    await loadScriptAsync('/js/team-modals.js');
if (!document.querySelector('team-modals')) {
                    const modalContainer = document.createElement('team-modals');
document.body.appendChild(modalContainer);
                }
                    await loadScriptAsync('/js/lobby-team.js');
                overwriteTeamSyncLogic();
                setTimeout(() => {
                    const targetModal = document.getElementById('joinTeamModal');
                    if (targetModal) {
                        targetModal.classList.remove('hidden');
                        targetModal.classList.add('flex');
} else if (typeof window.openJoinTeamModal === 'function') {
window.openJoinTeamModal();
} else {
console.error('找不到 joinTeamModal，也找不到 openJoinTeamModal');
alert('隊伍視窗載入了，但找不到加入小隊彈窗。');
                    }
}, 100);
            } catch (error) {
console.error('單機翻轉組隊模組載入失敗：', error);
alert('模組載入失敗，請打開 Console 查看錯誤來源。');
            }
        };
function loadScriptAsync(src) {
return new Promise((resolve, reject) => {
const existing = document.querySelector(`script[src="${src}"]`);
if (existing) {
resolve();
return;
}
const s = document.createElement('script');
s.src = src;
s.onload = resolve;
s.onerror = () => {
reject(new Error(`載入失敗：${src}`));
};
document.body.appendChild(s);
});
}
        function overwriteTeamSyncLogic() {
    function isApprovalRequired(value) {
        return value === true || value === 'true' || value === 1 || value === '1';
    }
    function isThemeRoomType(roomType) {
        return (
            roomType === 'selected_theme_room' ||
            roomType === 'theme_room' ||
            roomType === 'theme' ||
            roomType === 'simulated'
        );
    }
    window.startStandaloneTeamFlow = function({ teamId, teamName, targetUrl }) {
                    const teamParams = `&mode=team&teamId=${teamId}&teamName=${encodeURIComponent(teamName)}`;
                    window.tempTeamParams = teamParams;
        openStandaloneModal(targetUrl);
            };
    window.joinTeam = function(teamId, teamName, is_approval_required, roomType) {
        const jtm = document.getElementById('joinTeamModal');
        if (jtm) {
            jtm.classList.remove('flex');
            jtm.classList.add('hidden');
        }
        const needsApproval = isApprovalRequired(is_approval_required);
        if (isThemeRoomType(roomType)) {
            if (needsApproval) {
                socket.emit('request_join_team', {
                    teamName: teamId,
                    teamId: teamId,
                    username: username,
                    requestUser: username,
                    realTeamName: teamName,
                    roomType: 'managed-room.html',
                    isThemeTeam: true
                });
                if (window.showWaitingModal) window.showWaitingModal(teamName);
                return;
            }
            window.pendingThemeTeamJoinData = {
                teamId,
                teamName
            };
            if (typeof window.showThemeRoomModal === 'function') {
                window.showThemeRoomModal();
                    } else {
                alert('找不到主題教室彈窗，請確認 flip-room.html 的 openStandaloneThemeRoomModal 是否存在');
                    }
            return;
        }
        let mappedRoom = 'managed-room.html';
        if (roomType) {
            if (typeof roomType === 'string' && roomType.includes('immersive')) {
                mappedRoom = 'immersive-room.html';
            } else if (typeof roomType === 'string' && roomType.includes('managed')) {
                mappedRoom = 'managed-room.html';
            } else if (typeof roomType === 'string' && roomType.endsWith('.html')) {
                mappedRoom = roomType;
                } else {
                mappedRoom = `${roomType}-room.html`;
                }
        }
        if (needsApproval) {
            socket.emit('request_join_team', {
                teamName: teamId,
                teamId: teamId,
                username: username,
                requestUser: username,
                realTeamName: teamName,
                roomType: mappedRoom
            });
            if (window.showWaitingModal) window.showWaitingModal(teamName);
            return;
        }
        window.startStandaloneTeamFlow({
            teamId,
            teamName,
            targetUrl: mappedRoom
        });
    };
    socket.off('join_team_approved');
    socket.on('join_team_approved', (data) => {
        if (window.hideWaitingModal) window.hideWaitingModal();
        const approvedTeamId = data.teamId || data.teamName;
        const approvedTeamName = data.realTeamName || data.teamName;
        if (isThemeRoomType(data.roomType)) {
            window.pendingThemeTeamJoinData = {
                teamId: approvedTeamId,
                teamName: approvedTeamName
            };
            if (typeof window.showThemeRoomModal === 'function') {
                window.showThemeRoomModal();
            } else {
                alert('找不到主題教室彈窗，請確認 flip-room.html 的 openStandaloneThemeRoomModal 是否存在');
        }
            return;
        }
        const targetRoom = data.roomType || 'managed-room.html';
        window.startStandaloneTeamFlow({
            teamId: approvedTeamId,
            teamName: approvedTeamName,
            targetUrl: targetRoom
        });
    });
    socket.off('join_team_rejected');
    socket.on('join_team_rejected', () => {
        if (window.hideWaitingModal) window.hideWaitingModal();
        document.getElementById('standalone-modal-container').classList.remove('hidden');
        document.getElementById('rejected-modal').classList.remove('hidden');
    });
}
    </script>
</body>
