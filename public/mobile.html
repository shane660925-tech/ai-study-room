<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudyVerse | 翻轉連動模式</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/lobby.css">
</head>
<body class="mobile-page-body flex flex-col items-center justify-center h-screen text-slate-200 bg-[#0a0c14]">

    <div id="flippedOverlay" class="fixed inset-0 bg-[#064e3b] z-[9999] flex flex-col items-center justify-center hidden transition-all duration-300">
        <i class="fas fa-shield-alt text-7xl text-green-400 mb-6 drop-shadow-[0_0_15px_rgba(74,222,128,0.8)]"></i>
        <h1 class="text-3xl font-black text-white mb-2 tracking-widest">防護罩已啟動</h1>
        <p class="text-green-300 font-bold text-lg">AI 豁免生效中</p>
        <p class="text-xs text-green-500 mt-12 uppercase tracking-widest animate-pulse">請保持手機朝下 ‧ 專注看電腦螢幕</p>
    </div>

    <div id="warningOverlay" class="fixed inset-0 bg-[#7f1d1d] z-[9999] flex flex-col items-center justify-center hidden transition-all duration-300">
        <i class="fas fa-exclamation-triangle text-7xl text-red-500 mb-6 animate-bounce drop-shadow-[0_0_15px_rgba(239,68,68,0.8)]"></i>
        <h1 class="text-3xl font-black text-white mb-2 tracking-widest">偵測到違規！</h1>
        <p class="text-red-300 font-bold text-lg">手機翻轉中斷</p>
        <p class="text-xs text-red-400 mt-12 bg-black/30 px-4 py-2 rounded-full border border-red-500/30">已即時通報至教室與大廳</p>
    </div>

    <div id="setupView" class="text-center p-8 w-full max-w-sm">
        <div class="mb-6">
            <div class="relative inline-block">
                <i class="fas fa-mobile-alt text-6xl text-blue-500 mb-4"></i>
                <i class="fas fa-sync-alt absolute -right-2 -top-2 text-blue-400 animate-spin-slow text-xl"></i>
            </div>
            <h1 id="setupTitle" class="text-2xl font-black italic">StudyVerse Sync</h1>
            <p id="setupSubTitle" class="text-gray-400 text-sm mt-2">請確認您的身份並啟動偵測</p>
        </div>

        <div class="bg-white/5 border border-white/10 p-6 rounded-3xl backdrop-blur-md mb-8">
            <div id="nameInputGroup" class="mb-4">
                <label class="block text-left text-xs font-bold text-blue-400 uppercase tracking-widest mb-2 ml-1">學員暱稱</label>
                <input type="text" id="syncName" 
                    class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-all"
                    placeholder="輸入您的暱稱">
            </div>

            <button id="startBtn" class="bg-blue-600 hover:bg-blue-500 w-full py-4 rounded-xl font-bold shadow-lg shadow-blue-900/50 active:scale-95 transition-all flex items-center justify-center gap-3">
                <span id="startBtnText">啟動連動偵測</span>
                <i class="fas fa-satellite-dish"></i>
            </button>
        </div>

        <p class="text-[10px] text-slate-500 mt-6 uppercase tracking-widest">⚠️ 翻轉後請勿手動關閉螢幕電源</p>
        
        <a href="/flip-room.html" class="inline-block mt-8 text-xs text-gray-600 underline">返回總部大廳</a>
    </div>

    <div id="syncView" class="hidden text-center p-8">
        <div id="statusBall" class="w-48 h-48 rounded-full border-4 border-slate-700 flex flex-col items-center justify-center mx-auto mb-10 transition-all duration-700 bg-blue-900/10 shadow-[0_0_30px_rgba(59,130,246,0.1)]">
            <i id="statusIcon" class="fas fa-arrow-down text-5xl mb-3 text-blue-500 animate-bounce"></i>
            <p id="statusText" class="font-bold text-blue-400 tracking-widest">請將手機蓋上</p>
        </div>
        <div class="space-y-3">
            <h2 id="displayName" class="text-2xl font-black">---</h2>
            <div class="flex items-center justify-center gap-2">
                <span id="connectionBadge" class="bg-blue-500/20 text-blue-400 text-[10px] px-3 py-1 rounded-full border border-blue-500/30 font-bold uppercase tracking-tighter">
                    <i class="fas fa-link mr-1"></i> 單機模式已就緒
                </span>
            </div>
            <p id="targetRoomHint" class="text-xs text-gray-500 mt-4 px-6 italic"></p>
        </div>

        <button id="stopBtn" class="mt-12 text-gray-500 text-xs border border-gray-800 px-6 py-2 rounded-full hover:bg-red-900/20 hover:text-red-400 transition-all">
            停止偵測並返回
        </button>
    </div>

    <div class="fixed bottom-6 w-full px-8 pointer-events-none">
        <div id="status-box" class="max-w-xs mx-auto bg-black/60 backdrop-blur-md rounded-2xl p-4 border border-white/5 opacity-0 transition-opacity duration-500">
            <p id="status" class="text-center text-sm font-bold">等待中...</p>
            <p id="timer" class="text-center text-2xl font-mono mt-1 text-blue-400">00:00:00</p>
            <div id="sync-badge" class="hidden"></div>
        </div>
    </div>

    <script src="/js/flip.js"></script>

    <script>
        const socket = io();
        let hasFlipped = false;
        let studentName = "";

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const isStandalone = urlParams.get('standalone') === 'true';
            const targetRoom = urlParams.get('targetRoom');
            const syncToken = urlParams.get('sync'); 
            const urlName = urlParams.get('name'); // [新增] 抓取網址帶來的姓名
            
            // [新增] 如果網址有帶名字，自動填入並鎖定，防止打錯
            if (urlName) {
                const nameInput = document.getElementById('syncName');
                nameInput.value = urlName;
                nameInput.setAttribute('readonly', 'true');
                nameInput.classList.add('opacity-50', 'cursor-not-allowed');
            }

            if (isStandalone) {
                document.getElementById('setupTitle').innerText = "準備進入教室";
                document.getElementById('setupSubTitle').innerText = "點擊下方按鈕後翻轉手機即可進入";
                let roomName = "自習教室";
                if (targetRoom === 'immersive-room.html') roomName = "沉浸式自習室";
                if (targetRoom === 'managed-room.html') roomName = "模擬線上教室";
                document.getElementById('startBtnText').innerText = `進入 ${roomName}`;
                document.getElementById('targetRoomHint').innerText = `翻轉後，系統將自動跳轉至「${roomName}」並開始計時。`;
                
                const savedName = localStorage.getItem('studyVerseUser');
                if (savedName && !urlName) document.getElementById('nameInputGroup').classList.add('hidden');
            } else if (syncToken) {
                document.getElementById('setupTitle').innerText = "大廳連動就緒";
                document.getElementById('setupSubTitle').innerText = "請確認暱稱並點擊啟動連線";
                document.getElementById('startBtnText').innerText = "連線至主大廳";
            }
        });

        const setupArea = document.getElementById('setupView');
        const syncArea = document.getElementById('syncView');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        startBtn.addEventListener('click', () => {
            const name = document.getElementById('syncName').value.trim();
            const urlParams = new URLSearchParams(window.location.search);
            const syncToken = urlParams.get('sync'); 

            if(name) {
                studentName = name; 
                setupArea.classList.add('hidden');
                syncArea.classList.remove('hidden');
                document.getElementById('displayName').innerText = name;
                
                if (syncToken) {
                    socket.emit('request_link_device', { syncToken: syncToken, studentName: name });
                    const badge = document.getElementById('connectionBadge');
                    badge.innerHTML = '<i class="fas fa-check-circle mr-1"></i> 已與主大廳連線，請翻轉';
                    badge.className = 'bg-green-500/20 text-green-400 text-[10px] px-3 py-1 rounded-full border border-green-500/30 font-bold uppercase tracking-tighter animate-pulse';
                }
            }
        });

        stopBtn.addEventListener('click', () => {
            syncArea.classList.add('hidden');
            setupArea.classList.remove('hidden');
        });

        // [修改] 完善 DeviceOrientation 的防呆與違規邏輯
        window.addEventListener('deviceorientation', (event) => {
            if (event.beta !== null && studentName !== "") {
                if (Math.abs(event.beta) > 160) {
                    if (!hasFlipped) {
                        hasFlipped = true;
                        
                        // 1. 顯示防護罩
                        document.getElementById('flippedOverlay').classList.remove('hidden');
                        document.getElementById('warningOverlay').classList.add('hidden');
                        
                        // 2. 發送成功訊號給伺服器
                        socket.emit('update_status', { name: studentName, isFlipped: true });
                        socket.emit('mobile_sync_update', { type: 'FLIP_COMPLETED', studentName: studentName });
                    }
                } else {
                    if (hasFlipped) {
                        hasFlipped = false;
                        
                        // 1. 顯示中斷警告
                        document.getElementById('flippedOverlay').classList.add('hidden');
                        document.getElementById('warningOverlay').classList.remove('hidden');
                        
                        // 2. 告訴伺服器你拿起來了 (這會立刻觸發教室端的違規)
                        socket.emit('update_status', { name: studentName, isFlipped: false });
                        socket.emit('flip_failed', { name: studentName }); 
                    }
                }
            }
        });
    </script>
</body>
</html>
