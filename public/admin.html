<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVerse | 專業教師控管後端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    
   <link rel="stylesheet" href="/css/global.css">
   <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="bg-[#0f172a] text-slate-200 h-screen flex overflow-hidden font-sans">

    <aside class="w-80 border-r border-slate-800 flex flex-col bg-[#1e293b] flex-shrink-0">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-xl font-black text-blue-400 tracking-tighter italic uppercase">StudyVerse Pro</h1>
            <div id="systemClock" class="text-xs text-slate-400 mt-1 font-mono">2026.03.14 --:--:--</div>
        </div>

        <div class="p-6 space-y-6 flex-1 overflow-y-auto scroll-hide">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-widest">黑板公告更新</label>
                <textarea id="announcementInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500 text-white" rows="3" placeholder="輸入今日作業或小考內容..."></textarea>
                <button onclick="updateBlackboard()" class="w-full mt-2 bg-blue-600 hover:bg-blue-500 py-2.5 rounded-lg text-xs font-bold transition-all shadow-lg active:scale-95 uppercase">同步至學生端</button>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="exportCSV()" class="bg-slate-700/50 hover:bg-slate-600 py-3 rounded-xl text-[10px] font-bold flex flex-col items-center gap-1 transition-all active:scale-95 border border-slate-700">
                    <i class="fas fa-file-csv text-green-400 text-lg"></i>匯出報表
                </button>
                <button onclick="playChime()" class="bg-slate-700/50 hover:bg-slate-600 py-3 rounded-xl text-[10px] font-bold flex flex-col items-center gap-1 transition-all active:scale-95 border border-slate-700">
                    <i class="fas fa-bell text-yellow-400 text-lg"></i>播放下課鐘
                </button>
            </div>

            <div class="pt-4 border-t border-slate-800">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest">AI 主動事件日誌</label>
                    <button onclick="document.getElementById('logContainer').innerHTML=''" class="text-[10px] text-slate-500 hover:text-white">清除</button>
                </div>
                <div id="logContainer" class="bg-black/30 rounded-lg p-3 h-64 overflow-y-auto font-mono text-[10px] space-y-2 text-slate-400 border border-slate-800 custom-scroll">
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#0f172a] min-w-0 relative">
        <header class="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-[#1e293b]/50 backdrop-blur-md z-10">
            <div class="flex items-center gap-6">
                <span class="flex items-center gap-2 bg-blue-500/10 text-blue-400 px-4 py-1.5 rounded-full text-xs font-bold border border-blue-500/20">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                    </span>
                    在線人數：<span id="onlineCount">0</span>
                </span>
            </div>
            <div class="flex items-center gap-4 text-xs">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></div>
                    <span class="text-slate-400 font-medium">AI 監控保護中</span>
                </div>
            </div>
        </header>

        <div class="px-8 py-4 border-b border-slate-800 flex gap-3 bg-[#0f172a]">
            <span class="text-xs font-bold text-slate-500 self-center mr-2 uppercase tracking-widest">教室視角切換:</span>
            <button onclick="setRoomFilter('ALL')" id="filter-ALL" class="filter-btn px-4 py-1.5 rounded-full text-xs font-bold bg-blue-600 text-white shadow shadow-blue-500/20 transition-all">全部教室</button>
            <button onclick="setRoomFilter('2')" id="filter-2" class="filter-btn px-4 py-1.5 rounded-full text-xs font-bold bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-all border border-slate-700">沉浸式自習室</button>
            <button onclick="setRoomFilter('simulated')" id="filter-simulated" class="filter-btn px-4 py-1.5 rounded-full text-xs font-bold bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-all border border-slate-700">模擬線上教室</button>
            <button onclick="setRoomFilter('1')" id="filter-1" class="filter-btn px-4 py-1.5 rounded-full text-xs font-bold bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-all border border-slate-700">線上課程專區</button>
        </div>

        <section id="studentGrid" class="flex-1 p-8 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-8 overflow-y-auto custom-scroll content-start">
        </section>
    </main>

    <aside class="w-80 border-l border-slate-800 bg-[#1e293b] flex flex-col flex-shrink-0">
        <div class="flex border-b border-slate-800 bg-slate-900/50">
            <button onclick="switchTab('violations')" id="btn-violations" class="flex-1 py-4 text-[10px] font-black tracking-widest border-b-2 border-blue-500 text-blue-500 transition-all uppercase">證據分類流</button>
            <button onclick="switchTab('summary')" id="btn-summary" class="flex-1 py-4 text-[10px] font-black tracking-widest text-slate-500 border-b-2 border-transparent transition-all uppercase">數據總結</button>
        </div>

        <div id="tab-violations" class="flex-1 p-4 overflow-y-auto custom-scroll bg-slate-900/20">
        </div>

        <div id="tab-summary" class="hidden flex-1 p-6 overflow-y-auto custom-scroll">
            <h3 class="text-sm font-bold text-white mb-4"><i class="fas fa-chart-pie mr-2 text-blue-400"></i>今日學習概況</h3>
            <div id="summaryStats" class="space-y-4 mb-8"></div>
            
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 border-b border-slate-800 pb-2">學生結算報告</h3>
            <div id="summaryReportsList" class="space-y-3 text-[10px]">
                <p class="text-slate-600 italic text-center py-4">尚無學生結束自習</p>
            </div>
        </div>
    </aside>

    <div id="imageModal" class="fixed inset-0 z-[100] hidden bg-black/95 flex flex-col items-center justify-center p-8 backdrop-blur-md" onclick="closeImageModal()">
        <img id="modalImg" src="" class="max-w-full max-h-[75vh] rounded-lg shadow-2xl border border-white/10">
        <div class="mt-6 text-center">
            <h2 id="modalName" class="text-xl font-bold text-white"></h2>
            <p id="modalReason" class="text-red-400 text-sm mt-1"></p>
            <p class="text-slate-500 text-[10px] mt-6 opacity-50 uppercase tracking-widest">點擊任意位置返回</p>
        </div>
    </div>

    <script src="/js/admin.js"></script>
</body>
</html>
